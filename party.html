<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Party Ledger</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Serif+Text:ital@0;1&family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/components.css">
</head>
<body>
  <div class="nav-drawer-overlay" id="nav-drawer-overlay" hidden>
    <nav class="nav-drawer" id="nav-drawer" aria-label="Main navigation">
      <div class="nav-drawer__header">
        <span class="app-header__title">Udhar Ledger</span>
        <button class="icon-btn nav-drawer__close" id="nav-drawer-close" aria-label="Close menu">✕</button>
      </div>

      <div class="nav-drawer__section">
        <a href="index.html" class="nav-drawer__link" data-page="index">🏠 All Parties</a>
        <a href="#" class="nav-drawer__link" id="nav-drawer-search-link">🔍 Find a Party</a>
        <a href="scan.html" class="nav-drawer__link" data-page="scan">📷 Scan Diary Page</a>
        <a href="index.html?action=add-party" class="nav-drawer__link">➕ Add New Party</a>
      </div>

      <div class="nav-drawer__section">
        <a href="settings.html" class="nav-drawer__link" data-page="settings">⚙️ Settings</a>
      </div>
    </nav>
  </div>

  <div class="party-search-overlay" id="party-search-overlay" hidden>
    <div class="party-search-panel" role="dialog" aria-modal="true" aria-label="Find a party">
      <div class="party-search-panel__header">
        <button class="icon-btn" id="party-search-close" aria-label="Close search">←</button>
        <input
          type="text"
          id="party-search-input"
          class="form-input party-search-panel__input"
          placeholder="🔍 Find a party..."
          aria-label="Find a party by name"
        >
      </div>
      <div class="party-search-panel__results">
        <div id="party-search-results" class="party-search__result-list"></div>
        <div id="party-search-empty" class="empty-state" hidden>
          <p>No match for '[query]'.</p>
        </div>
      </div>
    </div>
  </div>

  <header class="app-header">
    <button class="icon-btn nav-trigger" id="nav-trigger" aria-label="Open menu">☰</button>
    <div class="app-header__title">Party Ledger</div>
    <button class="icon-btn" id="search-trigger" aria-label="Find a party">🔍</button>
  </header>

  <div class="page-shell page-shell--with-fab">
    <nav class="back-nav">
      <a href="index.html" class="back-nav__link">
        <span>←</span> <span>All Parties</span>
      </a>
    </nav>

    <div class="page-content">
      <!-- Party Name as Title -->
      <div class="party-title-row">
        <h1 class="party-title" id="party-title"></h1>
        <div class="kebab-menu-wrapper">
          <button class="icon-btn" id="party-menu-trigger" aria-haspopup="true" aria-expanded="false" aria-label="Party options">⋮</button>
          <div class="kebab-menu" id="party-menu" hidden role="menu" aria-label="Party options">
            <button class="kebab-menu__item kebab-menu__item--danger" id="btn-delete-party" role="menuitem">🗑️ Delete Party</button>
          </div>
        </div>
      </div>

      <!-- Balance Summary -->
      <div id="balance-summary" class="balance-summary" style="display: none;">
        <div class="balance-summary__label">Current Balance</div>
        <div id="current-balance" class="balance-summary__amount"></div>
        <div id="balance-label" style="font-size: 0.9rem; color: var(--color-ink-muted); margin-top: var(--space-xs);"></div>
        
        <div style="display: flex; gap: var(--space-md); justify-content: center; margin-top: var(--space-lg); font-size: 0.875rem;">
          <div>
            <div style="color: var(--color-ink-muted);">Total Jama</div>
            <div id="total-jama" style="font-family: var(--font-mono); font-weight: 500; color: var(--color-jama-text);"></div>
          </div>
          <div>
            <div style="color: var(--color-ink-muted);">Total Udhar</div>
            <div id="total-udhar" style="font-family: var(--font-mono); font-weight: 500; color: var(--color-udhar-text);"></div>
          </div>
        </div>
      </div>

      <!-- Balance Ribbon -->
      <div id="balance-ribbon" class="balance-ribbon"></div>

      <!-- Transactions Section -->
      <div style="margin-bottom: var(--space-lg);">
        <h2 style="font-family: var(--font-display); font-size: 1.125rem; margin-bottom: var(--space-md); color: var(--color-ink-muted); text-transform: uppercase; letter-spacing: 0.04em; font-weight: 400;">Transactions</h2>
        <div id="transactions-list" class="card-list"></div>

        <div id="empty-transactions" class="empty-state" hidden>
          <p>No entries yet. Add one above or scan a diary page.</p>
        </div>
      </div>
    </div>
  </div>

  <!-- FAB Bar with Add buttons -->
  <div class="fab-bar">
    <div class="fab-bar__inner" style="gap: var(--space-md);">
      <button class="btn btn--secondary" id="btn-add-udhar">+ Add Udhar</button>
      <button class="btn btn--primary" id="btn-add-jama">+ Add Jama</button>
    </div>
  </div>

  <!-- Modal for Adding Jama -->
  <div id="modal-add-jama" class="modal-overlay" hidden>
    <div class="card modal" role="dialog" aria-modal="true" aria-labelledby="add-jama-modal-title">
      <h2 class="modal__title" id="add-jama-modal-title">Add Jama</h2>
      <form id="form-add-jama">
        <div class="form-group">
          <label for="jama-amount" class="form-label">Amount</label>
          <input
            type="number"
            id="jama-amount"
            class="form-input form-input--amount"
            placeholder="0"
            min="0"
            required
          />
        </div>
        <div class="form-group">
          <label for="jama-date" class="form-label">Date</label>
          <input
            type="date"
            id="jama-date"
            class="form-input"
            required
          />
        </div>
        <div class="form-group">
          <label for="jama-note" class="form-label">Note (optional)</label>
          <input
            type="text"
            id="jama-note"
            class="form-input"
            placeholder="e.g., Cash payment"
          />
        </div>
        <div class="modal__actions">
          <button type="button" class="btn btn--secondary" id="btn-cancel-jama">Cancel</button>
          <button type="submit" class="btn btn--primary">Add Jama</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal for Adding Udhar -->
  <div id="modal-add-udhar" class="modal-overlay" hidden>
    <div class="card modal" role="dialog" aria-modal="true" aria-labelledby="add-udhar-modal-title">
      <h2 class="modal__title" id="add-udhar-modal-title">Add Udhar</h2>
      <form id="form-add-udhar">
        <div class="form-group">
          <label for="udhar-amount" class="form-label">Amount</label>
          <input
            type="number"
            id="udhar-amount"
            class="form-input form-input--amount"
            placeholder="0"
            min="0"
            required
          />
        </div>
        <div class="form-group">
          <label for="udhar-date" class="form-label">Date</label>
          <input
            type="date"
            id="udhar-date"
            class="form-input"
            required
          />
        </div>
        <div class="form-group">
          <label for="udhar-note" class="form-label">Note (optional)</label>
          <input
            type="text"
            id="udhar-note"
            class="form-input"
            placeholder="e.g., Cement bags"
          />
        </div>
        <div class="modal__actions">
          <button type="button" class="btn btn--secondary" id="btn-cancel-udhar">Cancel</button>
          <button type="submit" class="btn btn--primary">Add Udhar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal for confirming Delete Party — moved here from settings.html.
       Scoped to one record, not the whole database, so a plain Cancel/Delete
       choice is proportionate (no typed "DELETE" confirmation). -->
  <div id="modal-delete-party" class="modal-overlay" hidden>
    <div class="card modal" role="dialog" aria-modal="true" aria-labelledby="delete-party-title">
      <h2 class="modal__title" id="delete-party-title">Delete Party</h2>
      <p id="delete-party-text"></p>
      <div class="modal__actions">
        <button type="button" class="btn btn--secondary" id="btn-cancel-delete-party">Cancel</button>
        <button type="button" class="btn btn--danger" id="btn-confirm-delete-party">Delete</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.4.1"></script>
  <script src="config.js"></script>
  <script src="supabase.js"></script>
  <script src="app.js"></script>
  <script>
    let db;
    let partyId;
    let party;
    let transactions = [];

    // Initialize
    async function init() {
      try {
        partyId = getParam('id');
        if (!partyId) {
          showError('Invalid party ID');
          return;
        }

        db = initSupabase();
        await loadPartyData();
        initNavDrawer(db, 'party');
        initPartySearch(db);
        setupEventListeners();
      } catch (err) {
        showError('Failed to initialize: ' + err.message);
      }
    }

    // Load party and transactions
    async function loadPartyData() {
      try {
        showLoading('Loading party…');
        party = await getParty(db, partyId);
        transactions = await getTransactions(db, partyId);
        hideLoading();
        renderPartyView();
      } catch (err) {
        hideLoading();
        showError('Failed to load party: ' + err.message);
      }
    }

    // Render party view
    function renderPartyView() {
      // Set title
      document.getElementById('party-title').textContent = party.name;
      document.title = party.name + ' - Udhar Ledger';

      // Render balance summary
      renderBalanceSummary();

      // Render balance ribbon
      renderBalanceRibbon();

      // Render transactions list
      renderTransactionsList();
    }

    // Render balance summary
    function renderBalanceSummary() {
      const totalJama = transactions
        .filter(t => t.type === 'jama')
        .reduce((sum, t) => sum + (t.amount || 0), 0);

      const totalUdhar = transactions
        .filter(t => t.type === 'udhar')
        .reduce((sum, t) => sum + (t.amount || 0), 0);

      const derivedBalance = totalUdhar - totalJama;
      const balance = typeof party.current_balance === 'number' ? party.current_balance : derivedBalance;
      const balanceClass = balance > 0 ? 'balance-summary__amount--positive' :
                           balance < 0 ? 'balance-summary__amount--negative' :
                           'balance-summary__amount--zero';
      const balanceLabel = balance > 0 ? '(They owe us)' :
                           balance < 0 ? '(We owe them)' :
                           '(Settled)';

      document.getElementById('current-balance').textContent = formatCurrency(balance);
      document.getElementById('current-balance').className = `balance-summary__amount ${balanceClass}`;
      document.getElementById('balance-label').textContent = balanceLabel;
      document.getElementById('total-jama').textContent = formatCurrency(totalJama);
      document.getElementById('total-udhar').textContent = formatCurrency(totalUdhar);
      document.getElementById('balance-summary').style.display = 'block';
    }

    // Render balance ribbon (SVG visualization)
    // Below this many transactions, a sparkline has no real trend to show —
    // 1-3 points stretched across the full ribbon width renders as one or two
    // enormous blocks rather than a line. Show a plain-language hint instead.
    // See Phase 6 audit 1.3.
    const RIBBON_MIN_TRANSACTIONS = 4;

    function renderBalanceRibbon() {
      const ribbonEl = document.getElementById('balance-ribbon');

      if (transactions.length === 0) {
        ribbonEl.innerHTML = '';
        return;
      }

      if (transactions.length < RIBBON_MIN_TRANSACTIONS) {
        ribbonEl.innerHTML = '<p class="balance-ribbon__hint">Add a few more entries to see a trend.</p>';
        return;
      }

      // Get CSS color values
      const root = document.documentElement;
      const jamaColor = getComputedStyle(root).getPropertyValue('--color-jama').trim();
      const udharColor = getComputedStyle(root).getPropertyValue('--color-udhar').trim();

      // Sort transactions by date (oldest first) for ribbon
      const sorted = [...transactions].sort((a, b) => new Date(a.date) - new Date(b.date));

      // Calculate max amount for scaling
      const maxAmount = Math.max(...sorted.map(t => t.amount), 1);
      const centerY = 24;
      const maxHeight = 20;
      const barWidth = 3;
      const spacing = 2;
      const totalWidth = (barWidth + spacing) * sorted.length;

      // Create SVG. Purely decorative — the balance summary and transaction
      // list above/below already convey the same info as text, so hide it
      // from screen readers rather than let them attempt to parse raw <rect>
      // elements. See Phase 6 audit 2.7.
      let svg = '<svg viewBox="0 0 ' + totalWidth + ' 48" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" style="width: 100%; height: 100%;" aria-hidden="true">';

      // Center line
      svg += `<line x1="0" y1="${centerY}" x2="${totalWidth}" y2="${centerY}" stroke="currentColor" opacity="0.1" stroke-width="1" stroke-dasharray="2,2" />`;

      // Bars
      sorted.forEach((txn, idx) => {
        const x = idx * (barWidth + spacing);
        const height = (txn.amount / maxAmount) * maxHeight;
        const color = txn.type === 'jama' ? jamaColor : udharColor;

        if (txn.type === 'jama') {
          // Jama bars go up
          svg += `<rect x="${x}" y="${centerY - height}" width="${barWidth}" height="${height}" fill="${color}" rx="1" />`;
        } else {
          // Udhar bars go down
          svg += `<rect x="${x}" y="${centerY}" width="${barWidth}" height="${height}" fill="${color}" rx="1" />`;
        }
      });

      svg += '</svg>';
      ribbonEl.innerHTML = svg;
    }

    // Render transactions list
    function renderTransactionsList() {
      const listEl = document.getElementById('transactions-list');
      const emptyEl = document.getElementById('empty-transactions');

      listEl.innerHTML = '';

      if (transactions.length === 0) {
        listEl.hidden = true;
        emptyEl.hidden = false;
      } else {
        listEl.hidden = false;
        emptyEl.hidden = true;

        transactions.forEach(txn => {
          const card = createTransactionCard(txn);
          listEl.appendChild(card);
        });
      }
    }

    // Create transaction card element
    function createTransactionCard(txn) {
      const card = document.createElement('div');
      card.className = `card txn-card txn-card--${txn.type}`;

      const amount = formatCurrency(txn.amount);
      const date = formatDate(txn.date);

      card.innerHTML = `
        <div class="txn-card__row">
          <div class="txn-card__type">${txn.type.toUpperCase()}</div>
          <div class="txn-card__amount">${amount}</div>
        </div>
        <div class="txn-card__date">${date}</div>
      `;

      if (txn.note) {
        const noteDiv = document.createElement('div');
        noteDiv.className = 'txn-card__note';
        noteDiv.textContent = txn.note;
        card.appendChild(noteDiv);
      }

      return card;
    }

    // Setup event listeners
    function setupEventListeners() {
      // Add jama button
      document.getElementById('btn-add-jama').addEventListener('click', () => {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('jama-date').value = today;
        openModal(document.getElementById('modal-add-jama'));
      });

      // Cancel add jama modal
      document.getElementById('btn-cancel-jama').addEventListener('click', () => {
        closeModal(document.getElementById('modal-add-jama'));
        document.getElementById('form-add-jama').reset();
      });

      // Add jama form submit
      document.getElementById('form-add-jama').addEventListener('submit', async (e) => {
        e.preventDefault();
        const amount = parseFloat(document.getElementById('jama-amount').value);
        const date = document.getElementById('jama-date').value;
        const note = document.getElementById('jama-note').value.trim();

        if (amount <= 0) {
          showError('Amount must be greater than 0');
          return;
        }

        try {
          showLoading('Adding transaction…');
          await addTransaction(db, partyId, 'jama', amount, date, note || null, 'manual');
          hideLoading();
          closeModal(document.getElementById('modal-add-jama'));
          document.getElementById('form-add-jama').reset();
          await loadPartyData();
        } catch (err) {
          hideLoading();
          showError('Failed to add transaction: ' + err.message);
        }
      });

      // Add udhar button
      document.getElementById('btn-add-udhar').addEventListener('click', () => {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('udhar-date').value = today;
        openModal(document.getElementById('modal-add-udhar'));
      });

      // Cancel add udhar modal
      document.getElementById('btn-cancel-udhar').addEventListener('click', () => {
        closeModal(document.getElementById('modal-add-udhar'));
        document.getElementById('form-add-udhar').reset();
      });

      // Add udhar form submit
      document.getElementById('form-add-udhar').addEventListener('submit', async (e) => {
        e.preventDefault();
        const amount = parseFloat(document.getElementById('udhar-amount').value);
        const date = document.getElementById('udhar-date').value;
        const note = document.getElementById('udhar-note').value.trim();

        if (amount <= 0) {
          showError('Amount must be greater than 0');
          return;
        }

        try {
          showLoading('Adding transaction…');
          await addTransaction(db, partyId, 'udhar', amount, date, note || null, 'manual');
          hideLoading();
          closeModal(document.getElementById('modal-add-udhar'));
          document.getElementById('form-add-udhar').reset();
          await loadPartyData();
        } catch (err) {
          hideLoading();
          showError('Failed to add transaction: ' + err.message);
        }
      });

      // Party options (⋮) menu
      document.getElementById('party-menu-trigger').addEventListener('click', toggleKebabMenu);

      // Delete Party
      document.getElementById('btn-delete-party').addEventListener('click', () => {
        closeKebabMenu();
        document.getElementById('delete-party-text').textContent =
          `Delete ${party.name} and all of their transactions? This can't be undone.`;
        openModal(document.getElementById('modal-delete-party'));
      });

      document.getElementById('btn-cancel-delete-party').addEventListener('click', () => {
        closeModal(document.getElementById('modal-delete-party'));
      });

      document.getElementById('btn-confirm-delete-party').addEventListener('click', async () => {
        try {
          showLoading('Deleting party…');
          await deleteParty(db, partyId);
          hideLoading();
          window.location.href = 'index.html';
        } catch (err) {
          // Stay on the page with the modal open and the error visible —
          // same pattern as the Add Jama/Udhar handlers above — rather than
          // a silent redirect on a failed delete.
          hideLoading();
          showError('Failed to delete party: ' + err.message);
        }
      });
    }

    // Party options (⋮) menu — small, page-specific popover, not shared
    // behavior, so it lives here rather than in app.js. Anchored to the
    // party name it acts on, per Phase 7's dangerous-action-proximity notes.
    function toggleKebabMenu() {
      const menu = document.getElementById('party-menu');
      menu.hidden ? openKebabMenu() : closeKebabMenu();
    }
    function openKebabMenu() {
      const menu = document.getElementById('party-menu');
      menu.hidden = false;
      document.getElementById('party-menu-trigger').setAttribute('aria-expanded', 'true');
      menu.querySelector('.kebab-menu__item').focus();
      document.addEventListener('click', handleOutsideKebabClick);
      document.addEventListener('keydown', handleKebabEscape);
    }
    function closeKebabMenu() {
      const menu = document.getElementById('party-menu');
      menu.hidden = true;
      document.getElementById('party-menu-trigger').setAttribute('aria-expanded', 'false');
      document.removeEventListener('click', handleOutsideKebabClick);
      document.removeEventListener('keydown', handleKebabEscape);
    }
    function handleOutsideKebabClick(e) {
      if (!e.target.closest('.kebab-menu-wrapper')) closeKebabMenu();
    }
    function handleKebabEscape(e) {
      if (e.key === 'Escape') { closeKebabMenu(); document.getElementById('party-menu-trigger').focus(); }
    }

    // Initialize on page load
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
