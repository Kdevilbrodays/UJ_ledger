<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Udhar Ledger</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Serif+Text:ital@0;1&family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/components.css">
</head>
<body>
  <div class="nav-drawer-overlay" id="nav-drawer-overlay" hidden>
    <nav class="nav-drawer" id="nav-drawer" aria-label="Main navigation">
      <div class="nav-drawer__header">
        <span class="app-header__title">Udhar Ledger</span>
        <button class="icon-btn nav-drawer__close" id="nav-drawer-close" aria-label="Close menu">✕</button>
      </div>

      <div class="nav-drawer__section">
        <a href="index.html" class="nav-drawer__link" data-page="index">🏠 All Parties</a>
        <a href="#" class="nav-drawer__link" id="nav-drawer-search-link">🔍 Find a Party</a>
        <a href="scan.html" class="nav-drawer__link" data-page="scan">📷 Scan Diary Page</a>
        <a href="index.html?action=add-party" class="nav-drawer__link">➕ Add New Party</a>
      </div>

      <div class="nav-drawer__section">
        <a href="settings.html" class="nav-drawer__link" data-page="settings">⚙️ Settings</a>
      </div>
    </nav>
  </div>

  <div class="party-search-overlay" id="party-search-overlay" hidden>
    <div class="party-search-panel" role="dialog" aria-modal="true" aria-label="Find a party">
      <div class="party-search-panel__header">
        <button class="icon-btn" id="party-search-close" aria-label="Close search">←</button>
        <input
          type="text"
          id="party-search-input"
          class="form-input party-search-panel__input"
          placeholder="🔍 Find a party..."
          aria-label="Find a party by name"
        >
      </div>
      <div class="party-search-panel__results">
        <div id="party-search-results" class="party-search__result-list"></div>
        <div id="party-search-empty" class="empty-state" hidden>
          <p>No match for '[query]'.</p>
        </div>
      </div>
    </div>
  </div>

  <header class="app-header">
    <button class="icon-btn nav-trigger" id="nav-trigger" aria-label="Open menu">☰</button>
    <div class="app-header__title">Udhar Ledger</div>
    <button class="icon-btn" id="search-trigger" aria-label="Find a party">🔍</button>
    <button class="btn btn--primary app-header__action" id="btn-add-party">+ Add</button>
  </header>

  <div class="page-shell page-shell--with-fab">
    <div class="page-content">
      <!-- Header with Title and Actions -->
      <div class="page-content__header">
        <h1 class="page-content__title">All Parties</h1>
      </div>

      <!-- Search + Balance Filter -->
      <div class="filter-bar">
        <div class="filter-bar__field filter-bar__field--search">
          <label for="search-parties" class="form-label">Search</label>
          <input
            type="text"
            id="search-parties"
            class="form-input"
            placeholder="🔍 Search parties..."
            aria-label="Search parties by name"
          />
        </div>
        <div class="filter-bar__field filter-bar__field--balance">
          <label for="balance-filter" class="form-label">Balance</label>
          <select
            id="balance-filter"
            class="form-input"
            aria-label="Filter parties by balance"
          >
            <option value="all">All balances</option>
            <option value="positive">They owe us</option>
            <option value="negative">We owe them</option>
            <option value="settled">Settled</option>
          </select>
        </div>
      </div>

      <!-- Party Cards List -->
      <div id="parties-list" class="card-list"></div>

      <!-- Empty States -->
      <div id="empty-no-parties" class="empty-state" hidden>
        <p>No parties yet. Tap + Add to get started.</p>
      </div>

      <div id="empty-no-search" class="empty-state" hidden>
        <p id="empty-search-message">No match for '[query]'.</p>
      </div>
    </div>
  </div>

  <!-- FAB Bar (Floating Action Button) -->
  <div class="fab-bar">
    <div class="fab-bar__inner">
      <button class="btn btn--fab btn--primary" id="btn-scan-diary" title="Scan Diary Page">📷</button>
    </div>
  </div>

  <!-- Modal for Adding Party -->
  <div id="modal-add-party" class="modal-overlay" hidden>
    <div class="card modal" role="dialog" aria-modal="true" aria-labelledby="add-party-modal-title">
      <h2 class="modal__title" id="add-party-modal-title">Add Party</h2>
      <form id="form-add-party">
        <div class="form-group">
          <label for="input-party-name" class="form-label">Name</label>
          <input
            type="text"
            id="input-party-name"
            class="form-input"
            placeholder="e.g., Ramesh Traders"
            required
          />
        </div>
        <div class="form-group">
          <label for="input-party-phone" class="form-label">Phone (optional)</label>
          <input
            type="tel"
            id="input-party-phone"
            class="form-input"
            placeholder="e.g., 9876543210"
          />
        </div>
        <div class="modal__actions">
          <button type="button" class="btn btn--secondary" id="btn-cancel-add-party">Cancel</button>
          <button type="submit" class="btn btn--primary">Add</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal for Deleting Parties -->
  <div id="modal-delete-parties" class="modal-overlay" hidden>
    <div class="card modal" role="dialog" aria-modal="true" aria-labelledby="delete-parties-modal-title">
      <h2 class="modal__title" id="delete-parties-modal-title">Delete Selected Parties</h2>
      <div class="modal__body">
        <p id="delete-parties-warning" class="modal__text"></p>
      </div>
      <div class="modal__actions">
        <button type="button" class="btn btn--secondary" id="btn-cancel-delete-parties">Cancel</button>
        <button type="button" class="btn btn--danger" id="btn-confirm-delete-parties">Delete</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.4.1"></script>
  <script src="config.js"></script>
  <script src="supabase.js"></script>
  <script src="app.js"></script>
  <script>
    let db;
    let allParties = [];
    let subscription;
    let currentSearchQuery = '';
    let currentBalanceFilter = 'all';
    let isEditMode = false;
    let selectedPartyIds = new Set();
    let selectAll = false;

    // Initialize
    async function init() {
      try {
        db = initSupabase();
        await loadParties();
        initNavDrawer(db, 'index');
        initPartySearch(db);
        setupEventListeners();
        setupRealtimeSubscription();
        if (getParam('action') === 'add-party') {
          openModal(document.getElementById('modal-add-party'));
        }
      } catch (err) {
        showError('Failed to initialize: ' + err.message);
      }
    }

    // Load parties from database
    async function loadParties() {
      try {
        showLoading('Loading parties…');
        allParties = await getAllParties(db);
        hideLoading();
        renderParties();
      } catch (err) {
        hideLoading();
        showError('Failed to load parties: ' + err.message);
      }
    }

    // Render party cards
    function renderParties() {
      const listEl = document.getElementById('parties-list');
      const emptyNoPartiesEl = document.getElementById('empty-no-parties');
      const emptyNoSearchEl = document.getElementById('empty-no-search');

      let filtered = allParties;

      if (currentSearchQuery.trim()) {
        const lowerQuery = currentSearchQuery.toLowerCase();
        filtered = filtered.filter(p => p.name.toLowerCase().includes(lowerQuery));
      }

      filtered = filtered.filter(party => {
        const balance = party.current_balance || 0;
        if (currentBalanceFilter === 'positive') return balance > 0;
        if (currentBalanceFilter === 'negative') return balance < 0;
        if (currentBalanceFilter === 'settled') return balance === 0;
        return true;
      });

      listEl.innerHTML = '';

      if (filtered.length === 0) {
        if (currentSearchQuery.trim() || currentBalanceFilter !== 'all') {
          emptyNoPartiesEl.hidden = true;
          emptyNoSearchEl.hidden = false;
          const label = currentBalanceFilter === 'all' ? currentSearchQuery : `${currentSearchQuery || 'No'} ${currentBalanceFilter}`;
          document.getElementById('empty-search-message').textContent = `No match for '${label}'.`;
        } else {
          emptyNoPartiesEl.hidden = false;
          emptyNoSearchEl.hidden = true;
        }
      } else {
        emptyNoPartiesEl.hidden = true;
        emptyNoSearchEl.hidden = true;

        filtered.forEach(party => {
          const card = createPartyCard(party);
          listEl.appendChild(card);
          // Add edit mode controls if in edit mode
          if (isEditMode) {
            addEditModeControls(card, party.id);
          }
        });
      }
    }

    // Create party card element
    function createPartyCard(party) {
      const card = document.createElement(isEditMode ? 'div' : 'a');
      card.className = 'card party-card';
      card.dataset.partyId = party.id;

      if (!isEditMode) {
        card.href = `party.html?id=${party.id}`;
      }

      const balance = party.current_balance || 0;
      const balanceClass = balance > 0 ? 'party-card__balance--positive' :
                           balance < 0 ? 'party-card__balance--negative' :
                           'party-card__balance--zero';
      const balanceLabel = balance > 0 ? '(They owe us)' :
                           balance < 0 ? '(We owe them)' :
                           '(Settled)';

      // Format last_activity or show "Never"
      let lastActivityText = 'Never';
      if (party.last_activity) {
        const lastDate = new Date(party.last_activity).toISOString().split('T')[0];
        lastActivityText = 'Last: Updated · ' + formatRelativeDate(lastDate);
      }

      const infoDiv = document.createElement('div');
      infoDiv.className = 'party-card__info';

      const nameDiv = document.createElement('div');
      nameDiv.className = 'party-card__name';
      nameDiv.textContent = party.name;

      const metaDiv = document.createElement('div');
      metaDiv.className = 'party-card__meta';
      metaDiv.textContent = lastActivityText;

      infoDiv.append(nameDiv, metaDiv);

      const balanceDiv = document.createElement('div');
      balanceDiv.className = `party-card__balance ${balanceClass}`;
      balanceDiv.textContent = formatCurrency(balance);

      card.append(infoDiv, balanceDiv);

      // Add long-press listener
      addLongPressHandler(card, party);

      return card;
    }

    // Enter edit mode and add checkbox/delete button to cards
    function enterEditMode() {
      if (isEditMode) return;
      isEditMode = true;
      renderParties();
      updateHeaderState();
    }

    // Exit edit mode and remove checkbox/delete button from cards
    function exitEditMode() {
      isEditMode = false;
      selectedPartyIds.clear();
      selectAll = false;
      renderParties();
      updateHeaderState();
    }

    // Add checkbox and delete button to existing card
    function addEditModeControls(card, partyId) {
      // Remove existing controls if any (in case re-rendering)
      const existingCheckbox = card.querySelector('.party-card__checkbox');
      const existingDeleteBtn = card.querySelector('.party-card__delete');
      if (existingCheckbox) existingCheckbox.remove();
      if (existingDeleteBtn) existingDeleteBtn.remove();

      // Add checkbox
      const checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.className = 'party-card__checkbox';
      checkbox.dataset.partyId = partyId;
      checkbox.checked = selectedPartyIds.has(partyId);

      // Use click event for better cross-browser compatibility
      checkbox.addEventListener('click', (e) => {
        e.stopPropagation(); // Prevent card click
        console.log('Checkbox clicked for party:', partyId, 'checked:', e.target.checked);
        if (e.target.checked) {
          selectedPartyIds.add(partyId);
        } else {
          selectedPartyIds.delete(partyId);
        }
        console.log('Selected parties:', Array.from(selectedPartyIds));
        updateHeaderState();
      });
      card.insertBefore(checkbox, card.firstChild);

      // Add delete button
      const deleteBtn = document.createElement('button');
      deleteBtn.className = 'party-card__delete';
      deleteBtn.type = 'button';
      deleteBtn.ariaLabel = 'Delete party';
      deleteBtn.textContent = '✕';

      // Use click event for better cross-browser compatibility
      deleteBtn.addEventListener('click', (e) => {
        e.stopPropagation(); // Prevent card click
        console.log('Delete button clicked for party:', partyId);
        openDeleteModal(partyId);
      });
      card.appendChild(deleteBtn);

      return { checkbox, deleteBtn };
    }

    // Long-press handler
    function addLongPressHandler(card, party) {
      let pressTimer;
      const pressDuration = 500;
      let isPressing = false;
      let hasMoved = false;

      const startPress = (e) => {
        hasMoved = false;
        // Prevent context menu from appearing
        e.preventDefault();
        e.stopPropagation();

        isPressing = true;
        pressTimer = setTimeout(() => {
          console.log('Long press detected, entering edit mode');
          enterEditMode();
        }, pressDuration);
      };

      const movePress = (e) => {
        hasMoved = true;
        if (pressTimer) {
          clearTimeout(pressTimer);
        }
      };

      const endPress = (e) => {
        if (hasMoved) {
          // User moved while pressing, don't enter edit mode
          if (pressTimer) {
            clearTimeout(pressTimer);
          }
          return;
        }

        isPressing = false;
        if (pressTimer) {
          clearTimeout(pressTimer);
        }
      };

      card.addEventListener('touchstart', startPress, { passive: false });
      card.addEventListener('touchmove', movePress, { passive: true });
      card.addEventListener('touchend', endPress);
      card.addEventListener('touchcancel', endPress);
      card.addEventListener('mousedown', startPress, { passive: false });
      card.addEventListener('mousemove', movePress);
      card.addEventListener('mouseup', endPress);
      card.addEventListener('mouseleave', endPress);
    }

    // Setup event listeners
    function setupEventListeners() {
      // Add party button
      document.getElementById('btn-add-party').addEventListener('click', () => {
        openModal(document.getElementById('modal-add-party'));
      });

      // Cancel add party modal
      document.getElementById('btn-cancel-add-party').addEventListener('click', () => {
        closeModal(document.getElementById('modal-add-party'));
        document.getElementById('form-add-party').reset();
      });

      // Add party form submit
      document.getElementById('form-add-party').addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('input-party-name').value.trim();
        const phone = document.getElementById('input-party-phone').value.trim();

        if (!name) {
          showError('Party name is required');
          return;
        }

        try {
          showLoading('Adding party…');
          await addParty(db, name, phone || null);
          hideLoading();
          closeModal(document.getElementById('modal-add-party'));
          document.getElementById('form-add-party').reset();
          await loadParties();
        } catch (err) {
          hideLoading();
          showError('Failed to add party: ' + err.message);
        }
      });

      // Search input
      document.getElementById('search-parties').addEventListener('input', (e) => {
        currentSearchQuery = e.target.value;
        renderParties();
      });

      document.getElementById('balance-filter').addEventListener('change', (e) => {
        currentBalanceFilter = e.target.value;
        renderParties();
      });

      // Scan diary button
      document.getElementById('btn-scan-diary').addEventListener('click', () => {
        window.location.href = 'scan.html';
      });

      // Delete modal buttons
      document.getElementById('btn-cancel-delete-parties').addEventListener('click', () => {
        closeModal(document.getElementById('modal-delete-parties'));
      });

      document.getElementById('btn-confirm-delete-parties').addEventListener('click', async () => {
        try {
          showLoading('Deleting parties…');
          const deletePromises = Array.from(selectedPartyIds).map(id =>
            deleteParty(db, id)
          );
          await Promise.all(deletePromises);
          hideLoading();
          closeModal(document.getElementById('modal-delete-parties'));
          exitEditMode();
          await loadParties();
          showToast('Parties deleted successfully');
        } catch (err) {
          hideLoading();
          showError('Failed to delete parties: ' + err.message);
        }
      });

      // Click outside to exit edit mode
      document.addEventListener('click', (e) => {
        if (isEditMode) {
          const partyCards = document.querySelectorAll('.party-card');
          let clickedOutside = true;
          partyCards.forEach(card => {
            if (card.contains(e.target)) {
              clickedOutside = false;
            }
          });
          if (clickedOutside) {
            exitEditMode();
          }
        }
      });

      // Escape key to exit edit mode
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && isEditMode) {
          exitEditMode();
        }
      });

      // Select All checkbox
      const selectAllCheckbox = document.getElementById('select-all');
      if (selectAllCheckbox) {
        selectAllCheckbox.addEventListener('change', (e) => {
          selectAll = e.target.checked;
          selectedPartyIds.clear();
          if (selectAll) {
            filtered.forEach(party => {
              selectedPartyIds.add(party.id);
            });
          }
          renderParties();
        });
      }

      // Global click handler for edit mode
      document.addEventListener('click', (e) => {
        if (isEditMode) {
          // Check if clicking checkbox
          if (e.target.classList && e.target.classList.contains('party-card__checkbox')) {
            return; // Handled by checkbox event listener
          }

          // Check if clicking delete button
          if (e.target.classList && e.target.classList.contains('party-card__delete')) {
            return; // Handled by delete button event listener
          }

          // If not clicking card controls, exit edit mode
          if (!e.target.closest('.party-card')) {
            exitEditMode();
          }
        }
      });
    }

    // Setup real-time subscription
    function setupRealtimeSubscription() {
      subscription = subscribeToParties(db, () => {
        loadParties();
      });
    }

    // Enter edit mode
    function enterEditMode() {
      isEditMode = true;
      renderParties();
      updateHeaderState();
    }

    // Exit edit mode
    function exitEditMode() {
      isEditMode = false;
      selectedPartyIds.clear();
      selectAll = false;
      renderParties();
      updateHeaderState();
    }

    // Update header state based on edit mode and selections
    function updateHeaderState() {
      const header = document.querySelector('.page-content');
      if (isEditMode) {
        header.classList.add('page-content--edit-mode');
      } else {
        header.classList.remove('page-content--edit-mode');
      }

      // Update header text
      const titleEl = document.querySelector('.page-content__title');
      if (isEditMode) {
        titleEl.textContent = 'Delete Parties';
      } else {
        titleEl.textContent = 'All Parties';
      }

      // Add header actions if in edit mode
      let actionsEl = document.querySelector('.page-content__actions');
      if (isEditMode) {
        if (!actionsEl) {
          actionsEl = document.createElement('div');
          actionsEl.className = 'page-content__actions';
          header.appendChild(actionsEl);
        }

        // Add select all checkbox
        const selectAllWrapper = document.createElement('div');
        selectAllWrapper.className = 'page-content__select-all';

        const selectAll = document.createElement('input');
        selectAll.type = 'checkbox';
        selectAll.id = 'select-all';
        selectAll.className = 'form-checkbox select-all__checkbox';
        selectAll.checked = selectAll;

        const selectAllLabel = document.createElement('label');
        selectAllLabel.className = 'select-all__label';
        selectAllLabel.htmlFor = 'select-all';
        selectAllLabel.textContent = `Select All (${filtered.length})`;

        selectAllWrapper.append(selectAll, selectAllLabel);

        // Add delete button
        const deleteBtn = document.createElement('button');
        deleteBtn.type = 'button';
        deleteBtn.className = 'btn btn--danger';
        deleteBtn.textContent = `Delete ${selectedPartyIds.size} Party${selectedPartyIds.size > 1 ? 's' : ''}`;
        deleteBtn.disabled = selectedPartyIds.size === 0;
        deleteBtn.addEventListener('click', () => openDeleteModal());

        actionsEl.innerHTML = '';
        actionsEl.append(selectAllWrapper, deleteBtn);
      } else if (actionsEl) {
        actionsEl.remove();
      }
    }

    // Open delete modal
    function openDeleteModal() {
      const modal = document.getElementById('modal-delete-parties');
      const warningEl = document.getElementById('delete-parties-warning');
      const deleteBtn = document.getElementById('btn-confirm-delete-parties');

      warningEl.textContent = `This will permanently delete ${selectedPartyIds.size} party${selectedPartyIds.size > 1 ? 's' : ''} and all their transactions. This cannot be undone.`;
      deleteBtn.textContent = `Delete ${selectedPartyIds.size} Party${selectedPartyIds.size > 1 ? 's' : ''}`;
      openModal(modal);
    }

    // Initialize on page load
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
