<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Udhar Ledger</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Serif+Text:ital@0;1&family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/components.css">
</head>
<body>
  <div class="nav-drawer-overlay" id="nav-drawer-overlay" hidden>
    <nav class="nav-drawer" id="nav-drawer" aria-label="Main navigation">
      <div class="nav-drawer__header">
        <span class="app-header__title">Udhar Ledger</span>
        <button class="icon-btn nav-drawer__close" id="nav-drawer-close" aria-label="Close menu">✕</button>
      </div>

      <div class="nav-drawer__section">
        <a href="index.html" class="nav-drawer__link" data-page="index">🏠 All Parties</a>
        <a href="#" class="nav-drawer__link" id="nav-drawer-search-link">🔍 Find a Party</a>
        <a href="scan.html" class="nav-drawer__link" data-page="scan">📷 Scan Diary Page</a>
        <a href="index.html?action=add-party" class="nav-drawer__link">➕ Add New Party</a>
      </div>

      <div class="nav-drawer__section">
        <a href="settings.html" class="nav-drawer__link" data-page="settings">⚙️ Settings</a>
      </div>
    </nav>
  </div>

  <div class="party-search-overlay" id="party-search-overlay" hidden>
    <div class="party-search-panel" role="dialog" aria-modal="true" aria-label="Find a party">
      <div class="party-search-panel__header">
        <button class="icon-btn" id="party-search-close" aria-label="Close search">←</button>
        <input
          type="text"
          id="party-search-input"
          class="form-input party-search-panel__input"
          placeholder="🔍 Find a party..."
          aria-label="Find a party by name"
        >
      </div>
      <div class="party-search-panel__results">
        <div id="party-search-results" class="party-search__result-list"></div>
        <div id="party-search-empty" class="empty-state" hidden>
          <p>No match for '[query]'.</p>
        </div>
      </div>
    </div>
  </div>

  <header class="app-header">
    <button class="icon-btn nav-trigger" id="nav-trigger" aria-label="Open menu">☰</button>
    <div class="app-header__title">Udhar Ledger</div>
    <button class="icon-btn app-header__exit" id="btn-exit-delete-mode" aria-label="Exit delete mode" hidden>✕</button>
    <button class="icon-btn" id="search-trigger" aria-label="Find a party">🔍</button>
    <button class="btn btn--primary app-header__action" id="btn-add-party">+ Add</button>
  </header>

  <div class="page-shell page-shell--with-fab">
    <div class="page-content">
      <!-- Search + Balance Filter -->
      <div class="filter-bar">
        <div class="filter-bar__field filter-bar__field--search">
          <label for="search-parties" class="form-label">Search</label>
          <input
            type="text"
            id="search-parties"
            class="form-input"
            placeholder="🔍 Search parties..."
            aria-label="Search parties by name"
          />
        </div>
        <div class="filter-bar__field filter-bar__field--balance">
          <label for="balance-filter" class="form-label">Balance</label>
          <select
            id="balance-filter"
            class="form-input"
            aria-label="Filter parties by balance"
          >
            <option value="all">All balances</option>
            <option value="positive">They owe us</option>
            <option value="negative">We owe them</option>
            <option value="settled">Settled</option>
          </select>
        </div>
      </div>

      <!-- Party Cards List -->
      <div id="parties-list" class="card-list"></div>

      <!-- Empty States -->
      <div id="empty-no-parties" class="empty-state" hidden>
        <p>No parties yet. Tap + Add to get started.</p>
      </div>

      <div id="empty-no-search" class="empty-state" hidden>
        <p id="empty-search-message">No match for '[query]'.</p>
      </div>
    </div>
  </div>

  <!-- FAB Bar (Floating Action Button) -->
  <div class="fab-bar">
    <div class="fab-bar__inner">
      <button class="btn btn--fab btn--primary" id="btn-scan-diary" title="Scan Diary Page">📷</button>
    </div>
  </div>

  <!-- Modal for Adding Party -->
  <div id="modal-add-party" class="modal-overlay" hidden>
    <div class="card modal" role="dialog" aria-modal="true" aria-labelledby="add-party-modal-title">
      <h2 class="modal__title" id="add-party-modal-title">Add Party</h2>
      <form id="form-add-party">
        <div class="form-group">
          <label for="input-party-name" class="form-label">Name</label>
          <input
            type="text"
            id="input-party-name"
            class="form-input"
            placeholder="e.g., Ramesh Traders"
            required
          />
        </div>
        <div class="form-group">
          <label for="input-party-phone" class="form-label">Phone (optional)</label>
          <input
            type="tel"
            id="input-party-phone"
            class="form-input"
            placeholder="e.g., 9876543210"
          />
        </div>
        <div class="modal__actions">
          <button type="button" class="btn btn--secondary" id="btn-cancel-add-party">Cancel</button>
          <button type="submit" class="btn btn--primary">Add</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.4.1"></script>
  <script src="config.js"></script>
  <script src="supabase.js"></script>
  <script src="app.js"></script>
  <script>
    let db;
    let allParties = [];
    let subscription;
    let currentSearchQuery = '';
    let currentBalanceFilter = 'all';
    // Delete-mode state
    let isDeleteMode = false;
    const pendingDeleteIds = new Set(); // ids currently awaiting commit
    const pendingDeletes = new Map(); // id -> { timerId, party }

    // Initialize
    async function init() {
      try {
        db = initSupabase();
        await loadParties();
        initNavDrawer(db, 'index');
        initPartySearch(db);
        setupEventListeners();
        attachLongPress(document.getElementById('parties-list'));
        setupRealtimeSubscription();
        if (getParam('action') === 'add-party') {
          openModal(document.getElementById('modal-add-party'));
        }
      } catch (err) {
        showError('Failed to initialize: ' + err.message);
      }
    }

    // Load parties from database
    async function loadParties() {
      try {
        showLoading('Loading parties…');
        allParties = await getAllParties(db);
        hideLoading();
        renderParties();
      } catch (err) {
        hideLoading();
        showError('Failed to load parties: ' + err.message);
      }
    }

    // Render party cards
    function renderParties() {
      const listEl = document.getElementById('parties-list');
      const emptyNoPartiesEl = document.getElementById('empty-no-parties');
      const emptyNoSearchEl = document.getElementById('empty-no-search');

      let filtered = allParties;

      if (currentSearchQuery.trim()) {
        const lowerQuery = currentSearchQuery.toLowerCase();
        filtered = filtered.filter(p => p.name.toLowerCase().includes(lowerQuery));
      }

      filtered = filtered.filter(party => {
        const balance = party.current_balance || 0;
        if (currentBalanceFilter === 'positive') return balance > 0;
        if (currentBalanceFilter === 'negative') return balance < 0;
        if (currentBalanceFilter === 'settled') return balance === 0;
        return true;
      });

      // Never render parties currently pending deletion
      filtered = filtered.filter(p => !pendingDeleteIds.has(p.id));

      listEl.innerHTML = '';

      if (filtered.length === 0) {
        // If every party is pending-delete, exit delete mode and fall through
        if (allParties.length > 0 && pendingDeleteIds.size >= allParties.length) {
          exitDeleteMode();
        }
        if (currentSearchQuery.trim() || currentBalanceFilter !== 'all') {
          emptyNoPartiesEl.hidden = true;
          emptyNoSearchEl.hidden = false;
          const label = currentBalanceFilter === 'all' ? currentSearchQuery : `${currentSearchQuery || 'No'} ${currentBalanceFilter}`;
          document.getElementById('empty-search-message').textContent = `No match for '${label}'.`;
        } else {
          emptyNoPartiesEl.hidden = false;
          emptyNoSearchEl.hidden = true;
        }
      } else {
        emptyNoPartiesEl.hidden = true;
        emptyNoSearchEl.hidden = true;

        filtered.forEach(party => {
          const card = createPartyCard(party);
          listEl.appendChild(card);
        });
      }
    }

    // Create party card element
    function createPartyCard(party) {
      const card = document.createElement('div');
      card.dataset.partyId = party.id;
      card.setAttribute('role', 'button');
      card.tabIndex = 0;
      card.className = 'card party-card';

      const balance = party.current_balance || 0;
      const balanceClass = balance > 0 ? 'party-card__balance--positive' :
                           balance < 0 ? 'party-card__balance--negative' :
                           'party-card__balance--zero';
      const balanceLabel = balance > 0 ? '(They owe us)' :
                           balance < 0 ? '(We owe them)' :
                           '(Settled)';

      // Format last_activity or show "Never"
      let lastActivityText = 'Never';
      if (party.last_activity) {
        const lastDate = new Date(party.last_activity).toISOString().split('T')[0];
        lastActivityText = 'Last: Updated · ' + formatRelativeDate(lastDate);
      }

      const infoDiv = document.createElement('div');
      infoDiv.className = 'party-card__info';

      const nameDiv = document.createElement('div');
      nameDiv.className = 'party-card__name';
      nameDiv.textContent = party.name;

      const metaDiv = document.createElement('div');
      metaDiv.className = 'party-card__meta';
      metaDiv.textContent = lastActivityText;

      infoDiv.append(nameDiv, metaDiv);

      // When in delete mode, show delete button in place of balance
      if (isDeleteMode) {
        const delBtn = document.createElement('button');
        delBtn.className = 'party-card__delete-btn';
        delBtn.setAttribute('aria-label', `Delete ${party.name}`);
        delBtn.dataset.partyId = party.id;
        delBtn.title = 'Delete';
        delBtn.textContent = '🗑️';
        card.append(infoDiv, delBtn);
      } else {
        const balanceDiv = document.createElement('div');
        balanceDiv.className = `party-card__balance ${balanceClass}`;
        balanceDiv.textContent = formatCurrency(balance);
        card.append(infoDiv, balanceDiv);
      }

      return card;
    }

    // Setup event listeners
    function setupEventListeners() {
      // Add party button (handled below with flushPendingDeletes)

      // Cancel add party modal
      document.getElementById('btn-cancel-add-party').addEventListener('click', () => {
        closeModal(document.getElementById('modal-add-party'));
        document.getElementById('form-add-party').reset();
      });

      // Add party form submit
      document.getElementById('form-add-party').addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('input-party-name').value.trim();
        const phone = document.getElementById('input-party-phone').value.trim();

        if (!name) {
          showError('Party name is required');
          return;
        }

        try {
          showLoading('Adding party…');
          await addParty(db, name, phone || null);
          hideLoading();
          closeModal(document.getElementById('modal-add-party'));
          document.getElementById('form-add-party').reset();
          await loadParties();
        } catch (err) {
          hideLoading();
          showError('Failed to add party: ' + err.message);
        }
      });

      // Search input
      document.getElementById('search-parties').addEventListener('input', (e) => {
        currentSearchQuery = e.target.value;
        renderParties();
      });

      document.getElementById('balance-filter').addEventListener('change', (e) => {
        currentBalanceFilter = e.target.value;
        renderParties();
      });

      // Scan diary button
      document.getElementById('btn-scan-diary').addEventListener('click', () => {
        flushPendingDeletes();
        window.location.href = 'scan.html';
      });

      // Add party button
      document.getElementById('btn-add-party').addEventListener('click', () => {
        flushPendingDeletes();
        openModal(document.getElementById('modal-add-party'));
      });
    }

    // Setup real-time subscription
    function setupRealtimeSubscription() {
      subscription = subscribeToParties(db, () => {
        loadParties();
      });
    }

    // --- Delete-mode helpers -------------------------------------------------
    function enterDeleteMode() {
      if (isDeleteMode) return;
      isDeleteMode = true;
      document.body.classList.add('is-delete-mode');
      document.querySelector('.app-header__title').textContent = 'Tap 🗑️ to delete a party.';
      const exitBtn = document.getElementById('btn-exit-delete-mode');
      if (exitBtn) exitBtn.hidden = false;
      // push a history state so the back button can exit delete mode
      history.pushState({ ujDeleteMode: true }, '', location.href);
      showToast('Tap 🗑️ to delete a party. Go back to exit.');
      renderParties();
    }

    function exitDeleteMode() {
      if (!isDeleteMode) return;
      isDeleteMode = false;
      document.body.classList.remove('is-delete-mode');
      document.querySelector('.app-header__title').textContent = 'Udhar Ledger';
      const exitBtn = document.getElementById('btn-exit-delete-mode');
      if (exitBtn) exitBtn.hidden = true;
      renderParties();
    }

    // Commit delete immediately (called after grace timer expires or from flush)
    async function commitDelete(id) {
      const info = pendingDeletes.get(id);
      if (!info) return;
      pendingDeletes.delete(id);
      // attempt server delete
      try {
        await deleteParty(db, id);
        pendingDeleteIds.delete(id);
      } catch (err) {
        // restore the party in UI
        pendingDeleteIds.delete(id);
        if (info.party) {
          allParties.push(info.party);
          // re-sort by last_activity descending similar to load
          allParties.sort((a, b) => new Date(b.last_activity || 0) - new Date(a.last_activity || 0));
        }
        renderParties();
        showError(`Failed to delete ${info.party?.name || ''}. It has been restored.`);
      }
    }

    function scheduleDelete(party) {
      const id = party.id;
      if (pendingDeleteIds.has(id)) return;
      pendingDeleteIds.add(id);

      // visually hide the card with a short collapse; removal from DOM after animation
      const cardEl = document.querySelector(`[data-party-id="${id}"]`);
      if (cardEl) {
        cardEl.classList.add('party-card--hidden');
        setTimeout(() => {
          cardEl.remove();
        }, 180);
      }

      const timerId = setTimeout(() => {
        commitDelete(id);
      }, 4500);

      pendingDeletes.set(id, { timerId, party });

      // Show undo toast for this deletion. Only one visible at a time (intentional).
      showUndoToast(`Deleted ${party.name}`, () => {
        const info = pendingDeletes.get(id);
        if (!info) return;
        clearTimeout(info.timerId);
        pendingDeletes.delete(id);
        pendingDeleteIds.delete(id);
        // restore party to list
        allParties.push(info.party);
        allParties.sort((a, b) => new Date(b.last_activity || 0) - new Date(a.last_activity || 0));
        renderParties();
      });
    }

    function flushPendingDeletes() {
      // Immediately commit all pending deletes (cancel their grace timers)
      for (const [id, info] of Array.from(pendingDeletes.entries())) {
        clearTimeout(info.timerId);
        // fire commit without delay
        commitDelete(id);
      }
    }

    // Expose flushPendingDeletes globally so app.js can invoke it before navigation.
    window.flushPendingDeletes = flushPendingDeletes;

    // Delegated long-press + click/keyboard handling for party list
    function attachLongPress(listEl) {
      if (!listEl) return;
      let timer = null;
      let startX = 0;
      let startY = 0;
      let startTarget = null;
      let longFired = false;

      listEl.addEventListener('pointerdown', (e) => {
        if (e.button && e.button !== 0) return;
        startX = e.clientX;
        startY = e.clientY;
        startTarget = e.target.closest('.party-card');
        longFired = false;

        timer = setTimeout(() => {
          // Don't enter delete mode if press started on a delete button itself
          if (!startTarget) return;
          if (startTarget.querySelector('.party-card__delete-btn')?.contains(e.target)) return;
          enterDeleteMode();
          longFired = true;
          navigator.vibrate?.(15);
        }, 500);
      }, { passive: true });

      listEl.addEventListener('pointermove', (e) => {
        if (!timer) return;
        if (Math.hypot(e.clientX - startX, e.clientY - startY) > 10) {
          clearTimeout(timer);
          timer = null;
        }
      }, { passive: true });

      listEl.addEventListener('pointerup', (e) => {
        if (timer) {
          clearTimeout(timer);
          timer = null;
        }
        if (longFired) {
          e.preventDefault();
          e.stopPropagation();
        }
      });

      // Click delegation
      listEl.addEventListener('click', (e) => {
        const del = e.target.closest('.party-card__delete-btn');
        if (del) {
          const id = del.dataset.partyId;
          const party = allParties.find(p => p.id === id) || (pendingDeletes.get(id) && pendingDeletes.get(id).party);
          if (party) scheduleDelete(party);
          return;
        }

        const card = e.target.closest('.party-card');
        if (!card) return;
        const id = card.dataset.partyId;
        if (isDeleteMode) return; // inert while in delete mode
        flushPendingDeletes();
        window.location.href = `party.html?id=${id}`;
      });

      // Keyboard support: Enter/Space to navigate when not in delete mode
      listEl.addEventListener('keydown', (e) => {
        if (e.key !== 'Enter' && e.key !== ' ') return;
        const card = e.target.closest('.party-card');
        if (!card) return;
        const id = card.dataset.partyId;
        if (isDeleteMode) return;
        flushPendingDeletes();
        window.location.href = `party.html?id=${id}`;
      });
    }

    // Back button handling: if in delete mode, popstate should exit it
    window.addEventListener('popstate', (e) => {
      if (isDeleteMode) {
        exitDeleteMode();
      }
    });

    // Wire explicit exit button
    document.addEventListener('DOMContentLoaded', () => {
      const exitBtn = document.getElementById('btn-exit-delete-mode');
      exitBtn?.addEventListener('click', () => exitDeleteMode());
    });

    // Initialize on page load
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
